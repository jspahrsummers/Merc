name: .NET Core

on: [push, pull_request]

env:
  DOTNET_PROJECT: "Merc.sln"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 3.1.101
    - name: Install dependencies
      run: dotnet restore {{ env.DOTNET_PROJECT }}
    - name: Build
      run: dotnet build --configuration Release --no-restore {{ env.DOTNET_PROJECT }}
    - name: Test
      run: dotnet test --no-restore --verbosity normal {{ env.DOTNET_PROJECT }}
